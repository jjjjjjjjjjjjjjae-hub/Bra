plugins {
    id 'com.android.application'
}
android {
    namespace 'com.secure.privatebrowser'
    compileSdk 34
    defaultConfig {
        applicationId "com.secure.privatebrowser"
        minSdk 24
        targetSdk 34
        versionCode 2
        versionName "1.1"
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    // Жаңарту анимациясы үшін қажетті ресми кітапхана
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
}
