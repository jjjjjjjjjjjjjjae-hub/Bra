name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Ресми Gradle Action арқылы тұрақты 8.4 ортасын орнату
    - name: Setup Gradle 8.4 Environment
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    # 1. Қолданбаның ішкі атын "Chat GPT" деп жазу
    - name: Configure App Name Strings
      run: |
        mkdir -p app/src/main/res/values
        cat << 'INNER_EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">Chat GPT</string>
        </resources>
        INNER_EOF

    # 2. Android Manifest файлын күштеп жаңа ат пен белгішеге баптау
    - name: Patch Android Manifest
      run: |
        MANIFEST_PATH=$(find . -name AndroidManifest.xml -print -quit)
        if [ -n "$MANIFEST_PATH" ]; then
          echo "[+] AndroidManifest.xml табылды: $MANIFEST_PATH"
          # Манифест ішіндегі android:label және android:icon параметрлерін біздің жаңа мәндерге ауыстыру
          sed -i 's/android:label="[^"]*"/android:label="@string\/app_name"/g' "$MANIFEST_PATH"
          sed -i 's/android:icon="[^"]*"/android:icon="@mipmap\/ic_launcher"/g' "$MANIFEST_PATH"
          echo "[+] Манифест файл сәтті патчталды."
        else
          echo "[-] Error: AndroidManifest.xml табылмады!"
        fi

    # 3. Суретті барлық форматтағы иконка папкаларына басты белгіше етіп көшіру
    - name: Setup App Icon from Project Photo
      run: |
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        
        if ls *.jpg 1> /dev/null 2>&1; then
            IMG_FILE=$(ls *.jpg | head -n 1)
            # Суретті дұрыс атаумен және PNG форматымен барлық өлшемдерге көшіру
            cp -f "$IMG_FILE" app/src/main/res/mipmap-hdpi/ic_launcher.png
            cp -f "$IMG_FILE" app/src/main/res/mipmap-mdpi/ic_launcher.png
            cp -f "$IMG_FILE" app/src/main/res/mipmap-xhdpi/ic_launcher.png
            cp -f "$IMG_FILE" app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            cp -f "$IMG_FILE" app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            echo "[+] Иконка суреті сәтті ауыстырылған файл: $IMG_FILE"
        else
            echo "[-] Папкада .jpg форматты сурет табылмады!"
        fi

    # 4. Қолданбаны жинақтау
    - name: Build with Gradle
      run: gradle assembleDebug

    # 5. APK-ны бұлтқа "chat-gpt.apk" деген нақты атаумен жүктеу
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: chat-gpt-apk
        path: "**/build/outputs/apk/debug/*.apk"
