name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 1. Қолданбаның атын "Chat GPT" деп өзгерту және ресурстарды реттеу
    - name: Configure App Name and Strings
      run: |
        mkdir -p app/src/main/res/values
        cat << 'INNER_EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">Chat GPT</string>
        </resources>
        INNER_EOF

    # 2. Негізгі папкадағы фотоны қолданбаның басты иконкасы ретінде көшіру
    - name: Setup App Icon from Project Photo
      run: |
        # Егер жобада кез келген .jpg немесе .png сурет болса, оны басты иконка ретінде mipmap папкаларына таратамыз
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        
        # index.html немесе жоба ішіндегі Kaspi стиліндегі фотоны/суретті ic_launcher.png ретінде қолдану
        # (Егер нақты сурет файлы болса, соны көшіреді, болмаса қате бермей өткізеді)
        cp -f *.jpg app/src/main/res/mipmap-hdpi/ic_launcher.jpg 2>/dev/null || true
        cp -f *.png app/src/main/res/mipmap-hdpi/ic_launcher.png 2>/dev/null || true

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: chat-gpt-apk
        path: app/build/outputs/apk/debug/app-debug.apk
