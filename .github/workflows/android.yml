name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 1. Қолданбаның атын "Chat GPT" деп өзгерту
    - name: Configure App Name
      run: |
        mkdir -p app/src/main/res/values
        cat << 'INNER_EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">Chat GPT</string>
        </resources>
        INNER_EOF

    # 2. Жоба ішіндегі нақты суретті иконка папкаларына басты белгіше етіп көшіру
    - name: Setup App Icon from Project Photo
      run: |
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        
        # Папка ішіндегі кез келген .jpg суретті (мысалы 23343.jpg немесе 23353.jpg) ресми ic_launcher.png белгішесіне айналдырып көшіреміз
        if ls *.jpg 1> /dev/null 2>&1; then
            cp -f $(ls *.jpg | head -n 1) app/src/main/res/mipmap-hdpi/ic_launcher.png
            cp -f $(ls *.jpg | head -n 1) app/src/main/res/mipmap-mdpi/ic_launcher.png
            cp -f $(ls *.jpg | head -n 1) app/src/main/res/mipmap-xhdpi/ic_launcher.png
            cp -f $(ls *.jpg | head -n 1) app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            cp -f $(ls *.jpg | head -n 1) app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            echo "[+] Сурет сәтті басты иконкаға ауыстырылды."
        else
            echo "[-] Папка ішінде .jpg сурет табылмады, стандартты белгіше қалады."
        fi

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 3. Қате бермейтін ең жаңа V4 нұсқасын қолдану
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: chat-gpt-apk
        path: app/build/outputs/apk/debug/app-debug.apk
