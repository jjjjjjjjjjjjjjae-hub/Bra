name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Репозиторийде gradlew болмаса, бұлтта жаңадан генерациялау
    - name: Initialize Gradle Wrapper if Missing
      run: |
        if [ ! -f "gradlew" ]; then
          echo "[!] gradlew файлы жоқ. Жаңадан құрылуда..."
          gradle wrapper
        fi
        chmod +x gradlew

    # Қолданбаның атын "Chat GPT" деп өзгерту
    - name: Configure App Name
      run: |
        mkdir -p app/src/main/res/values
        cat << 'INNER_EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">Chat GPT</string>
        </resources>
        INNER_EOF

    # Тұрған суретті (.jpg) басты иконкаға айналдыру
    - name: Setup App Icon from Project Photo
      run: |
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        
        if ls *.jpg 1> /dev/null 2>&1; then
            IMG_FILE=$(ls *.jpg | head -n 1)
            cp -f "$IMG_FILE" app/src/main/res/mipmap-hdpi/ic_launcher.png
            cp -f "$IMG_FILE" app/src/main/res/mipmap-mdpi/ic_launcher.png
            cp -f "$IMG_FILE" app/src/main/res/mipmap-xhdpi/ic_launcher.png
            cp -f "$IMG_FILE" app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            cp -f "$IMG_FILE" app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            echo "[+] Иконка ауыстырылды: $IMG_FILE"
        else
            echo "[-] Сурет табылмады, стандартты белгіше қалады."
        fi

    # Қолданбаны жинақтау
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # Дайын APK-ны бұлтқа жүктеу (V4 нұсқасы)
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: chat-gpt-apk
        path: app/build/outputs/apk/debug/app-debug.apk
