name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Тұрақты 8.4 Gradle ортасын орнату
    - name: Setup Gradle 8.4 Environment
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    # 1. Ресурс папкасы мен Манифест орнын нақты анықтау
    - name: Locate Android Resources
      run: |
        MANIFEST_PATH=$(find . -name AndroidManifest.xml -not -path "*/build/*" -print -quit)
        if [ -n "$MANIFEST_PATH" ]; then
          RES_DIR=$(dirname "$MANIFEST_PATH")/res
          echo "RES_DIR=$RES_DIR" >> $GITHUB_ENV
          echo "MANIFEST_PATH=$MANIFEST_PATH" >> $GITHUB_ENV
          echo "[+] Манифест: $MANIFEST_PATH"
          echo "[+] Ресурс папкасы: $RES_DIR"
        else
          echo "[-] Error: Манифест табылмады!"
          exit 1
        fi

    # 2. Манифестті тазалап, жаңа атау мен белгішелерді КҮШТЕП кіргізу
    - name: Force Patch Android Manifest
      run: |
        sed -i 's/android:icon="[^"]*"//g' "${{ env.MANIFEST_PATH }}"
        sed -i 's/android:roundIcon="[^"]*"//g' "${{ env.MANIFEST_PATH }}"
        sed -i 's/android:label="[^"]*"//g' "${{ env.MANIFEST_PATH }}"
        
        sed -i 's/<application/<application android:label="@string\/app_name" android:icon="@mipmap\/ic_launcher" android:roundIcon="@mipmap\/ic_launcher"/g' "${{ env.MANIFEST_PATH }}"
        echo "[+] Манифест толықтай күштеп патчталды."

    # 3. Қолданбаның атын "Chat GPT" деп нақты жазу
    - name: Configure App Name Strings
      run: |
        mkdir -p "${{ env.RES_DIR }}/values"
        cat << 'INNER_EOF' > "${{ env.RES_DIR }}/values/strings.xml"
        <resources>
            <string name="app_name">Chat GPT</string>
        </resources>
        INNER_EOF

    # 4. Нақты logo/ папкасындағы PNG суретті басты белгіше ету
    - name: Setup App Icon from Project Photo
      run: |
        # Ескі белгішелерді тазалау
        find "${{ env.RES_DIR }}" -name "ic_launcher*" -delete
        
        # Жаңа mipmap папкаларын ашу
        mkdir -p "${{ env.RES_DIR }}/mipmap-hdpi"
        mkdir -p "${{ env.RES_DIR }}/mipmap-mdpi"
        mkdir -p "${{ env.RES_DIR }}/mipmap-xhdpi"
        mkdir -p "${{ env.RES_DIR }}/mipmap-xxhdpi"
        mkdir -p "${{ env.RES_DIR }}/mipmap-xxxhdpi"
        
        # Нақты көрсетілген логотип файлын анықтау
        TARGET_IMG="logo/chat gpt logo.png"
        
        if [ -f "$TARGET_IMG" ]; then
            echo "[+] Логотип табылды, көшіру басталды: $TARGET_IMG"
            cp -f "$TARGET_IMG" "${{ env.RES_DIR }}/mipmap-hdpi/ic_launcher.png"
            cp -f "$TARGET_IMG" "${{ env.RES_DIR }}/mipmap-mdpi/ic_launcher.png"
            cp -f "$TARGET_IMG" "${{ env.RES_DIR }}/mipmap-xhdpi/ic_launcher.png"
            cp -f "$TARGET_IMG" "${{ env.RES_DIR }}/mipmap-xxhdpi/ic_launcher.png"
            cp -f "$TARGET_IMG" "${{ env.RES_DIR }}/mipmap-xxxhdpi/ic_launcher.png"
            echo "[+] Иконка файлдары сәтті жаңартылды."
        else
            echo "[-] Төтенше жағдай: $TARGET_IMG файлы табылмады!"
            exit 1
        fi

    # 5. Қолданбаны жинақтау
    - name: Build with Gradle
      run: gradle assembleDebug

    # 6. APK-ны бұлтқа жүктеу
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: chat-gpt-apk
        path: "**/build/outputs/apk/debug/*.apk"
